name: Deploy dashboard

# Publishes the standalone dashboard to GitHub Pages on every push to main.
# The deployed site runs the built-in simulation (no live bench backend, since
# that runs locally over localhost) - which is exactly the safe standalone demo.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions".  (Public repos: free. Private repos need GitHub Pro.)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
