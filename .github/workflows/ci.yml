name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Protocol + gateway tests (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        working-directory: voltbridge-bench
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install paho-mqtt

      - name: Compile all modules (syntax check)
        working-directory: voltbridge-bench
        run: python -m compileall -q bench.py pmbus_stack.py modbus_stack.py dc_stack.py dc_protocols.py redfish_gateway.py

      - name: Run protocol test suite (CAN + PMBus + Modbus)
        working-directory: voltbridge-bench
        run: python test_protocols.py

      - name: Run Redfish gateway self-test
        working-directory: voltbridge-bench
        run: python test_gateway.py

  build:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build
