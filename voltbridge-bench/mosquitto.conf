# VoltBridge MQTT broker config (Mosquitto)
# Two listeners:
#   1883 = plain TCP  -> the Python bench publishes here (paho-mqtt)
#   9001 = WebSocket  -> the browser dashboard subscribes here (mqtt.js)
# Browsers cannot speak raw MQTT/TCP, so the WebSocket listener is required
# for the dashboard to connect.

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true
