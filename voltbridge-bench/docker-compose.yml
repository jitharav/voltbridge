# VoltBridge — full live stack in containers.
#
# The bench runs ONE mode at a time, so services are grouped into profiles that
# match the two demo stories. Run one profile at a time:
#
#   DC / data-center rack  (Redfish console at http://localhost:8080/):
#       docker compose --profile dc up --build
#       override the chip:   CHIP=tpu docker compose --profile dc up
#
#   EV / fast-charge       (OCPP monitor at http://localhost:9100/):
#       docker compose --profile ev up --build
#       override the car:    VEHICLE=models docker compose --profile ev up
#
# The broker and anomaly detector run in both profiles (no profile = always on).
# The dashboard (npm run dev on the host) connects to the broker at
# localhost:9001 and works the same whether the broker is here or on the host.

services:
  broker:
    image: eclipse-mosquitto:2
    container_name: vb-broker
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"   # TCP  — bench + gateways
      - "9001:9001"   # WebSocket — browser dashboard
    restart: unless-stopped

  anomaly:
    build: .
    image: voltbridge-bench
    container_name: vb-anomaly
    depends_on: [broker]
    command: python anomaly_detector.py --broker broker:1883
    restart: unless-stopped

  # ---- DC profile -----------------------------------------------------------
  bench-dc:
    build: .
    image: voltbridge-bench
    container_name: vb-bench-dc
    profiles: ["dc"]
    depends_on: [broker]
    command: python bench.py --mode dc --mqtt --broker broker:1883 --chip ${CHIP:-gb200} --duration 100000
    restart: unless-stopped

  redfish:
    build: .
    image: voltbridge-bench
    container_name: vb-redfish
    profiles: ["dc"]
    depends_on: [broker]
    command: python redfish_gateway.py --broker broker:1883 --port 8080
    ports:
      - "8080:8080"   # Redfish management console
    restart: unless-stopped

  # ---- EV profile -----------------------------------------------------------
  bench-ev:
    build: .
    image: voltbridge-bench
    container_name: vb-bench-ev
    profiles: ["ev"]
    depends_on: [broker]
    command: python bench.py --mode ev --mqtt --broker broker:1883 --vehicle ${VEHICLE:-taycan} --duration 100000
    restart: unless-stopped

  ocpp-csms:
    build: .
    image: voltbridge-bench
    container_name: vb-ocpp-csms
    profiles: ["ev"]
    command: python ocpp_csms.py --port 9000 --http-port 9100
    ports:
      - "9000:9000"   # OCPP WebSocket (CSMS)
      - "9100:9100"   # Charge Point Monitor UI
    restart: unless-stopped

  ocpp-gateway:
    build: .
    image: voltbridge-bench
    container_name: vb-ocpp-gateway
    profiles: ["ev"]
    depends_on: [broker, ocpp-csms]
    command: python ocpp_gateway.py --broker broker:1883 --csms ws://ocpp-csms:9000/CP1
    restart: unless-stopped
