# VoltBridge fleet PoC — cloud-native telemetry pipeline, one command:
#     docker compose -f docker-compose.fleet.yml up --build
# Then open the fleet dashboard:  http://localhost:8090/
# Scale simulated nodes:  NODES=500 docker compose -f docker-compose.fleet.yml up
# Scale consumers (horizontal):  docker compose -f docker-compose.fleet.yml up --scale consumer=3
name: voltbridge-fleet
services:
  broker:
    image: eclipse-mosquitto:2
    container_name: vbf-broker
    volumes: [ "./fleet-mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" ]
    ports: [ "1883:1883" ]

  kafka:
    image: apache/kafka:3.7.0
    container_name: vbf-kafka
    ports: [ "9092:9092" ]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: vbf-tsdb
    environment:
      POSTGRES_PASSWORD: voltbridge
      POSTGRES_DB: fleet
    ports: [ "5432:5432" ]

  bridge:
    build: { context: ., dockerfile: Dockerfile.fleet }
    image: voltbridge-fleet
    container_name: vbf-bridge
    depends_on: [ broker, kafka ]
    command: python mqtt_kafka_bridge.py
    environment: { MQTT_BROKER: "broker:1883", KAFKA: "kafka:9092" }
    restart: unless-stopped

  simulator:
    image: voltbridge-fleet
    depends_on: [ broker, bridge ]
    command: python fleet_simulator.py
    environment: { MQTT_BROKER: "broker:1883", NODES: "${NODES:-100}", HZ: "5" }
    restart: unless-stopped

  consumer:
    image: voltbridge-fleet
    depends_on: [ kafka, timescaledb ]
    command: python fleet_consumer.py
    environment:
      KAFKA: "kafka:9092"
      GROUP: "fleet-consumers"
      DATABASE_URL: "postgresql://postgres:voltbridge@timescaledb:5432/fleet"
      PORT: "8090"
    ports: [ "8090:8090" ]
    restart: unless-stopped
